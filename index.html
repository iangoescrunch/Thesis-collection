<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locked In — Expected Interaction Patterns</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f7;
      min-height: 100vh;
      padding: 28px 16px 48px;
    }
    #root {
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      padding: 32px 28px 36px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.09);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState } = React;

/* ── palette ────────────────────────────────────────────── */
const C = {
  highNFCC : "#c0392b",
  lowNFCC  : "#2980b9",
  axis     : "#333",
  grid     : "#e0e0e0",
  label    : "#555",
  bg       : "#ffffff",
  title    : "#1a1a1a",
};

/* ── nice-tick generator ─────────────────────────────────
   Produces evenly-spaced "round" ticks that neatly span
   [dataMin, dataMax].  Steps are constrained to
   1 / 2 / 5 / 10 / 25 / 50 … × powers of 10 so ticks
   always land on clean integers or simple decimals.       */
function niceTicks(dataMin, dataMax, targetCount = 5) {
  const range     = dataMax - dataMin || 1;
  const roughStep = range / targetCount;
  const mag       = Math.pow(10, Math.floor(Math.log10(roughStep)));
  // candidate nice steps
  const step = [1, 2, 5, 10].map(f => f * mag).find(s => s >= roughStep) || mag * 10;

  const first = Math.ceil(dataMin / step) * step;
  const ticks  = [];
  for (let v = first; v <= dataMax + step * 0.001; v += step) {
    ticks.push(Math.round(v * 1e9) / 1e9);   // float-safety round
  }
  return ticks;
}

/* ── Plot ────────────────────────────────────────────────── */
function Plot({ title, subtitle, yLabel, yMin, yMax, highNFCC, lowNFCC, yNote }) {
  const W   = 430;
  const H   = 330;
  const pad = { top: 58, right: 32, bottom: 70, left: 82 };
  const pw  = W - pad.left - pad.right;
  const ph  = H - pad.top  - pad.bottom;

  const xScale = v => pad.left + v * pw;
  const yScale = v => pad.top + ph - ((v - yMin) / (yMax - yMin)) * ph;

  const yTicks = niceTicks(yMin, yMax, 5);
  const xTicks = [
    { norm: 0,   label: "Low"  },
    { norm: 0.5, label: "Med"  },
    { norm: 1,   label: "High" },
  ];

  return (
    <div style={{
      background: C.bg, borderRadius: 8, padding: 16,
      border: "1px solid #ddd", width: W, flexShrink: 0,
    }}>
      <svg width={W} height={H} style={{ fontFamily: "Arial, sans-serif", display: "block" }}>

        {/* titles */}
        <text x={W/2} y={20} textAnchor="middle" fontSize={14} fontWeight="bold" fill={C.title}>
          {title}
        </text>
        {subtitle && (
          <text x={W/2} y={37} textAnchor="middle" fontSize={11} fill={C.label}>
            {subtitle}
          </text>
        )}

        {/* Y-axis label (rotated) */}
        <text
          x={14} y={pad.top + ph / 2}
          textAnchor="middle" fontSize={11} fill={C.label}
          transform={`rotate(-90,14,${pad.top + ph / 2})`}
        >{yLabel}</text>

        {/* X-axis label */}
        <text
          x={pad.left + pw / 2} y={H - 6}
          textAnchor="middle" fontSize={12} fill={C.label} fontWeight="bold"
        >AI Employment Threat (IV) →</text>

        {/* horizontal grid lines + Y tick labels */}
        {yTicks.map((val, i) => {
          const y   = yScale(val);
          const fmt = Number.isInteger(val) ? String(val) : val.toFixed(1);
          return (
            <g key={i}>
              <line x1={pad.left} y1={y} x2={pad.left + pw} y2={y}
                    stroke={C.grid} strokeWidth={1} />
              <line x1={pad.left - 5} y1={y} x2={pad.left} y2={y}
                    stroke={C.axis} strokeWidth={1} />
              <text x={pad.left - 8} y={y + 4} textAnchor="end" fontSize={10} fill={C.label}>
                {fmt}
              </text>
            </g>
          );
        })}

        {/* X tick marks + labels */}
        {xTicks.map(({ norm, label }) => {
          const x = xScale(norm);
          return (
            <g key={label}>
              <line x1={x} y1={pad.top + ph} x2={x} y2={pad.top + ph + 5}
                    stroke={C.axis} strokeWidth={1} />
              <text x={x} y={pad.top + ph + 17} textAnchor="middle" fontSize={10} fill={C.label}>
                {label}
              </text>
            </g>
          );
        })}

        {/* axes */}
        <line x1={pad.left} y1={pad.top} x2={pad.left}       y2={pad.top + ph}
              stroke={C.axis} strokeWidth={2} />
        <line x1={pad.left} y1={pad.top + ph} x2={pad.left + pw} y2={pad.top + ph}
              stroke={C.axis} strokeWidth={2} />

        {/* High NFCC line + endpoints */}
        <line x1={xScale(0)} y1={yScale(highNFCC[0])} x2={xScale(1)} y2={yScale(highNFCC[1])}
              stroke={C.highNFCC} strokeWidth={3} />
        <circle cx={xScale(0)} cy={yScale(highNFCC[0])} r={5} fill={C.highNFCC} />
        <circle cx={xScale(1)} cy={yScale(highNFCC[1])} r={5} fill={C.highNFCC} />

        {/* Low NFCC line + endpoints */}
        <line x1={xScale(0)} y1={yScale(lowNFCC[0])} x2={xScale(1)} y2={yScale(lowNFCC[1])}
              stroke={C.lowNFCC} strokeWidth={3} strokeDasharray="8,4" />
        <circle cx={xScale(0)} cy={yScale(lowNFCC[0])} r={5} fill={C.lowNFCC} />
        <circle cx={xScale(1)} cy={yScale(lowNFCC[1])} r={5} fill={C.lowNFCC} />

        {/* legend */}
        <line x1={pad.left + 10} y1={pad.top + ph + 44}
              x2={pad.left + 36} y2={pad.top + ph + 44}
              stroke={C.highNFCC} strokeWidth={3} />
        <text x={pad.left + 41} y={pad.top + ph + 48} fontSize={10} fill={C.title}>
          High NFCC (+1 SD)
        </text>

        <line x1={pad.left + pw / 2 + 10} y1={pad.top + ph + 44}
              x2={pad.left + pw / 2 + 36} y2={pad.top + ph + 44}
              stroke={C.lowNFCC} strokeWidth={3} strokeDasharray="8,4" />
        <text x={pad.left + pw / 2 + 41} y={pad.top + ph + 48} fontSize={10} fill={C.title}>
          Low NFCC (−1 SD)
        </text>

        {/* optional corner note */}
        {yNote && (
          <text x={pad.left + pw} y={pad.top + 14} textAnchor="end"
                fontSize={9} fill={C.label} fontStyle="italic">{yNote}</text>
        )}
      </svg>
    </div>
  );
}

/* ── data + annotation copy ──────────────────────────────── */
const PLOTS = [
  {
    title:    "Plot 1: Exploitation Onset",
    subtitle: "Primary behavioral DV",
    yLabel:   "Exploitation Onset (trial #)",
    yMin: 10, yMax: 80,
    highNFCC: [55, 20], lowNFCC: [60, 50],
    yNote: "Lower = earlier lock-in (worse)",
  },
  {
    title:    "Plot 2: Inverse Temperature (β)",
    subtitle: "Computational DV — exploitation tendency",
    yLabel:   "Inverse Temperature (β)",
    yMin: 0, yMax: 12,
    highNFCC: [4, 11], lowNFCC: [3.5, 5],
    yNote: "Higher = more deterministic choice",
  },
  {
    title:    "Plot 3: Exploration Bonus (φ)",
    subtitle: "Computational DV — directed exploration",
    yLabel:   "Exploration Bonus (φ)",
    yMin: 0, yMax: 5,
    highNFCC: [3.5, 0.5], lowNFCC: [3.2, 2.5],
    yNote: "Lower = less uncertainty-seeking",
  },
  {
    title:    "Plot 4: Re-exploration Latency",
    subtitle: "Secondary behavioral DV (H3)",
    yLabel:   "Trials to Resume Exploring",
    yMin: 0, yMax: 50,
    highNFCC: [8, 40], lowNFCC: [7, 12],
    yNote: "Higher = more rigid after shift",
  },
];

const TAB_LABELS = ["Onset (H1/H2)", "β (H1/H2)", "φ (H1/H2)", "Re-explore (H3)"];

const NOTES = [
  <>
    <strong>Y-axis:</strong> Exploitation onset trial — the trial at which the participant
    stops exploring and commits to one arm. The prediction is that high-threat, high-NFCC
    participants lock in earliest (low trial number). The red line drops steeply; the blue
    line stays relatively flat. That divergence is the interaction.<br /><br />
    <strong>Regression test:</strong> Y = b₀ + b₁(Threat) + b₂(NFCC) + b₃(Threat × NFCC) + ε.
    If b₃ is significant, the simple slope of Threat at high NFCC is steeper than at low NFCC.
  </>,
  <>
    <strong>Y-axis:</strong> Inverse temperature (β) from hBayesDM — how deterministically the
    participant follows value estimates. High β means choices are almost entirely driven by which
    arm seems best. Low β means choices have noise (exploration). The prediction: high threat +
    high NFCC produces the highest β.<br /><br />
    <strong>Note:</strong> β is extracted from the computational model. The model sees only the
    200 choices and outcomes. It does not see the survey scores.
  </>,
  <>
    <strong>Y-axis:</strong> Exploration bonus (φ) — how much the participant seeks out uncertain
    arms. φ near 0 means uncertainty does not attract sampling. Higher φ means the participant
    actively explores arms they know less about. The prediction: threat reduces φ, and NFCC
    amplifies that reduction.<br /><br />
    <strong>Interpretation:</strong> Threat makes uncertainty aversive rather than informative.
    High NFCC lowers the threshold at which that aversion overrides the value of information.
  </>,
  <>
    <strong>Y-axis:</strong> Re-exploration latency — trials after the contingency shift (trial
    101) before the participant resumes sampling other arms. This is the rigidity test (H3). A
    flexible participant detects the shift quickly and re-explores. A rigid participant persists
    with the old arm.<br /><br />
    <strong>Key distinction:</strong> Plot 1 tests early commitment. This plot tests whether that
    commitment survives changed conditions. Both can be early exploiters, but only the rigid ones
    stay locked in post-shift.
  </>,
];

/* ── button style helper ─────────────────────────────────── */
const btnStyle = active => ({
  padding: "8px 14px",
  border:      active ? "2px solid #333" : "1px solid #ccc",
  borderRadius: 6,
  background:  active ? "#f0f0f0" : "#fff",
  fontWeight:  active ? "bold" : "normal",
  fontSize: 13,
  cursor: "pointer",
});

/* ── App ─────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState(0);

  return (
    <div>
      <h2 style={{ color: C.title, marginBottom: 4 }}>
        Locked In — Expected Interaction Patterns
      </h2>
      <p style={{ color: C.label, fontSize: 14, marginBottom: 8, lineHeight: 1.5 }}>
        Each plot shows the predicted AI Threat × NFCC interaction for one DV.{" "}
        The <span style={{ color: C.highNFCC, fontWeight: "bold" }}>red solid line</span> is
        high NFCC (+1 SD). The{" "}
        <span style={{ color: C.lowNFCC, fontWeight: "bold" }}>blue dashed line</span> is
        low NFCC (−1 SD). Diverging slopes = significant interaction (b₃).
      </p>
      <p style={{ color: C.label, fontSize: 13, marginBottom: 20, fontStyle: "italic" }}>
        X-axis is always AI Threat (IV). Y-axis is always the DV. NFCC (moderator) splits the
        lines. These are hypothetical patterns, not data.
      </p>

      {/* tab bar */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        {TAB_LABELS.map((lbl, i) => (
          <button key={i} onClick={() => setTab(i)} style={btnStyle(tab === i)}>{lbl}</button>
        ))}
        <button onClick={() => setTab(-1)} style={btnStyle(tab === -1)}>Show All</button>
      </div>

      {/* plots */}
      {tab === -1 ? (
        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fill, minmax(430px, 1fr))",
          gap: 16,
        }}>
          {PLOTS.map((pl, i) => <Plot key={i} {...pl} />)}
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 12 }}>
          <Plot {...PLOTS[tab]} />
          <div style={{
            background: "#f8f8f8", borderRadius: 6, padding: 14,
            maxWidth: 430, border: "1px solid #eee",
          }}>
            <p style={{ margin: 0, fontSize: 13, color: "#333", lineHeight: 1.6 }}>
              {NOTES[tab]}
            </p>
          </div>
        </div>
      )}

      {/* footer callout */}
      <div style={{
        marginTop: 24, padding: 14,
        background: "#fef9e7", borderRadius: 6, border: "1px solid #f0e0a0",
      }}>
        <p style={{ margin: 0, fontSize: 13, color: "#555", lineHeight: 1.6 }}>
          <strong>Reading these plots:</strong> The X-axis is always the same IV (AI Employment
          Threat, continuous, measured by AIAS). The Y-axis changes per DV. The two lines represent
          the moderator (NFCC) at ±1 SD. The interaction hypothesis (H2) predicts that the lines
          diverge: the effect of AI Threat on the DV is strong at high NFCC and weak at low NFCC.
          If the lines were parallel, there would be no interaction — only a main effect of AI Threat.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
